apiVersion: apps/v1
kind: Deployment

metadata:
  name: analytics-service

spec:
  replicas: 3

  selector:
    matchLabels:
      app: analytics-service

  template:
    metadata:
      labels:
        app: analytics-service

    spec:
      containers:
      - name: analytics-service
        image: enterprise/analytics-service:1.0

        ports:
        - containerPort: 8080

        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"

          limits:
            memory: "1Gi"
            cpu: "1000m"