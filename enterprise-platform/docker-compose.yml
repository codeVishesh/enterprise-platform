version: '3.9'

services:

  gateway:
    build: ./gateway
    ports:
      - "8080:8080"

  auth-service:
    build: ./backend/auth-service

  user-service:
    build: ./backend/user-service

  analytics-service:
    build: ./backend/analytics-service

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: enterprise
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

  redis:
    image: redis:7